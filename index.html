<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeroClaw Todos</title>
    <style>
      :root {
        color-scheme: light;
        --color-background: #f4f7fb;
        --color-surface: #ffffff;
        --color-text: #172033;
        --color-muted: #5f6f89;
        --color-border: #d8e0ec;
        --color-accent: #2563eb;
        --color-accent-soft: #e8efff;
        --color-accent-strong: #1d4ed8;
        --color-button-text: #ffffff;
        --shadow-card: 0 24px 60px rgba(23, 32, 51, 0.14);
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.5rem;
        --space-6: 2rem;
        --radius-1: 0.375rem;
        --radius-2: 0.5rem;
        --radius-3: 0.75rem;
        --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.32);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --color-background: #101827;
          --color-surface: #182235;
          --color-text: #edf2ff;
          --color-muted: #a9b7cf;
          --color-border: #2c3a52;
          --color-accent: #7aa2ff;
          --color-accent-soft: #233456;
          --color-accent-strong: #a9c1ff;
          --color-button-text: #10213f;
          --shadow-card: 0 24px 60px rgba(0, 0, 0, 0.34);
          --focus-ring: 0 0 0 3px rgba(122, 162, 255, 0.38);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-5);
        padding: var(--space-6);
        background: var(--color-background);
        color: var(--color-text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      main {
        width: min(100%, 36rem);
      }

      section {
        padding: var(--space-6);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-3);
        background: var(--color-surface);
        box-shadow: var(--shadow-card);
      }

      section > * + * {
        margin-top: var(--space-5);
      }

      .todo-form {
        display: grid;
        gap: var(--space-3);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-2);
        padding: var(--space-3) var(--space-4);
        background: var(--color-surface);
        color: var(--color-text);
      }

      button {
        border: 0;
        border-radius: var(--radius-2);
        padding: var(--space-3) var(--space-4);
        background: var(--color-accent);
        color: var(--color-button-text);
        cursor: pointer;
      }

      button:hover {
        background: var(--color-accent-strong);
      }

      .todo-list {
        min-height: 5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .empty-state {
        display: grid;
        min-height: 5rem;
        place-items: center;
        border: 1px dashed var(--color-border);
        border-radius: var(--radius-2);
        color: var(--color-muted);
        text-align: center;
      }

      .task-row {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--color-border);
      }

      .task-row:first-child {
        border-top: 1px solid var(--color-border);
      }

      .task-label {
        display: flex;
        flex: 1;
        align-items: center;
        gap: var(--space-3);
        min-width: 0;
      }

      .task-checkbox {
        width: 1.125rem;
        height: 1.125rem;
        margin: 0;
        accent-color: var(--color-accent);
      }

      .task-text {
        overflow-wrap: anywhere;
      }

      .task-row.is-completed .task-text {
        color: var(--color-muted);
        text-decoration: line-through;
      }

      .task-delete {
        border: 1px solid transparent;
        padding: var(--space-2) var(--space-3);
        background: transparent;
        color: var(--color-muted);
      }

      .task-delete:hover {
        border-color: var(--color-border);
        background: var(--color-accent-soft);
        color: var(--color-text);
      }

      .todo-footer {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        color: var(--color-muted);
      }

      .todo-count {
        font-weight: 600;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }

      .filter-button,
      .clear-button {
        border: 1px solid transparent;
        padding: var(--space-2) var(--space-3);
        background: transparent;
        color: var(--color-muted);
      }

      .filter-button:hover,
      .clear-button:hover {
        border-color: var(--color-border);
        background: var(--color-accent-soft);
        color: var(--color-text);
      }

      .filter-button[aria-pressed="true"] {
        border-color: var(--color-accent);
        background: var(--color-accent-soft);
        color: var(--color-text);
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        box-shadow: var(--focus-ring);
        outline: 2px solid transparent;
        outline-offset: 2px;
      }

      @media (min-width: 36rem) {
        .todo-form {
          grid-template-columns: 1fr auto;
        }

        .todo-form label {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 35.9375rem) {
        body {
          justify-content: flex-start;
        }

        .todo-footer,
        .filters {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ZeroClaw Todos</h1>
    </header>

    <main>
      <section class="todo-card" aria-labelledby="todo-card-title">
        <h2 id="todo-card-title">Todo List</h2>

        <form id="todo-form" class="todo-form">
          <label for="todo-input">New todo</label>
          <input id="todo-input" name="todo" type="text" autocomplete="off" placeholder="What needs to be done?">
          <button type="submit">Add</button>
        </form>

        <ul id="todo-list" class="todo-list" aria-label="Todos">
          <li class="empty-state">No tasks yet.</li>
        </ul>

        <footer class="todo-footer">
          <p id="todo-count" class="todo-count" aria-live="polite">0 items</p>

          <div class="filters" aria-label="Filter todos">
            <button class="filter-button" type="button" data-filter="all" aria-pressed="true">All</button>
            <button class="filter-button" type="button" data-filter="active" aria-pressed="false">Active</button>
            <button class="filter-button" type="button" data-filter="completed" aria-pressed="false">Completed</button>
          </div>

          <button id="clear-completed" class="clear-button" type="button">Clear completed</button>
        </footer>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
