<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeroClaw Todos</title>
    <style></style>
  </head>
  <body>
    <header>
      <h1>ZeroClaw Todos</h1>
    </header>

    <main>
      <section aria-labelledby="todo-card-title">
        <h2 id="todo-card-title">Todo List</h2>

        <form>
          <label for="todo-input">New todo</label>
          <input id="todo-input" name="todo" type="text" autocomplete="off">
          <button type="submit">Add</button>
        </form>

        <ul aria-label="Todos"></ul>

        <footer>
          <p>0 items</p>
        </footer>
      </section>
    </main>

    <script></script>
  </body>
</html>
