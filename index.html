<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeroClaw Todos</title>
    <style>
      :root {
        color-scheme: light;
        --color-background: #f4f7fb;
        --color-surface: #ffffff;
        --color-text: #172033;
        --color-muted: #5f6f89;
        --color-border: #d8e0ec;
        --color-accent: #2563eb;
        --color-accent-strong: #1d4ed8;
        --shadow-card: 0 24px 60px rgba(23, 32, 51, 0.14);
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.5rem;
        --space-6: 2rem;
        --radius-1: 0.375rem;
        --radius-2: 0.5rem;
        --radius-3: 0.75rem;
        --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.32);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --color-background: #101827;
          --color-surface: #182235;
          --color-text: #edf2ff;
          --color-muted: #a9b7cf;
          --color-border: #2c3a52;
          --color-accent: #7aa2ff;
          --color-accent-strong: #a9c1ff;
          --shadow-card: 0 24px 60px rgba(0, 0, 0, 0.34);
          --focus-ring: 0 0 0 3px rgba(122, 162, 255, 0.38);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-5);
        padding: var(--space-6);
        background: var(--color-background);
        color: var(--color-text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      main {
        width: min(100%, 36rem);
      }

      section {
        padding: var(--space-6);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-3);
        background: var(--color-surface);
        box-shadow: var(--shadow-card);
      }

      section > * + * {
        margin-top: var(--space-5);
      }

      form {
        display: grid;
        gap: var(--space-3);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-2);
        padding: var(--space-3) var(--space-4);
        background: var(--color-surface);
        color: var(--color-text);
      }

      button {
        border: 0;
        border-radius: var(--radius-2);
        padding: var(--space-3) var(--space-4);
        background: var(--color-accent);
        color: var(--color-surface);
        cursor: pointer;
      }

      button:hover {
        background: var(--color-accent-strong);
      }

      ul {
        min-height: var(--space-6);
        margin-bottom: 0;
        padding-left: var(--space-5);
      }

      footer {
        color: var(--color-muted);
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        box-shadow: var(--focus-ring);
        outline: 2px solid transparent;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ZeroClaw Todos</h1>
    </header>

    <main>
      <section aria-labelledby="todo-card-title">
        <h2 id="todo-card-title">Todo List</h2>

        <form>
          <label for="todo-input">New todo</label>
          <input id="todo-input" name="todo" type="text" autocomplete="off">
          <button type="submit">Add</button>
        </form>

        <ul aria-label="Todos"></ul>

        <footer>
          <p>0 items</p>
        </footer>
      </section>
    </main>

    <script></script>
  </body>
</html>
